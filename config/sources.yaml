# ==============================================================
# 曼城转会情报站 - 信源配置（依据「曼城转会窗媒体可信度指南 2026版」）
# 日常维护只需要改这个文件：加/删信源、改 tier、维护热门球员名单
#
# tier 说明:
#   T0  树上等（最可靠）        T1  权威媒体（错误较少）
#   T2  流量媒体（偶尔准，看源） ITK 圈内人/爆料号（自行甄别）
#
# type 说明:
#   twitter  经 RSSHub 抓 X 时间线（需要配置 X cookie）
#   rss      官方 RSS 源直抓
#   gnews    Google News RSS 站内检索（无 RSS / 有付费墙的媒体）
#
# filter 说明（抓到的内容要过哪些关卡才收录）:
#   city+transfer  既要曼城相关、又要转会相关（综合类媒体源）
#   city           只要曼城相关（记者个人号，窗口期发言都值得看）
#   transfer       只要转会相关（本身已是曼城专属频道）
#   none           全收（曼城专属记者个人号）
# ==============================================================

settings:
  days_keep: 14 # 页面保留最近 N 天的内容
  max_items: 2000 # 条目数量上限
  exclude_retweets: true # 过滤纯转推（RT）
  exclude_replies: true # 过滤回复推文

# 判定"与曼城相关"的关键词（不区分大小写，命中任意一个即可）
city_keywords:
  - manchester city
  - man city
  - man. city
  - "#mcfc"
  - mcfc
  - etihad
  - guardiola
  - cityzens

# 判定"与转会相关"的关键词（英文取词根，能同时命中 sign/signing/signed 等；
# 后半段是西/意/法/德/葡语转会词，用于外语媒体）
transfer_keywords:
  - transfer
  - sign
  - deal
  - bid
  - fee
  - agree
  - medical
  - contract
  - loan
  - clause
  - here we go
  - exclusive
  - personal terms
  - talks
  - negotiat
  - target
  - swoop
  - offer
  - approach
  - join
  - depart
  - exit
  - windows
  - wants
  - move
  # ---- 多语言 ----
  - fichaje # 西语·签约
  - fichar
  - mercado
  - traspaso
  - acuerdo
  - oferta
  - préstamo
  - cedido
  - mercato # 意语·转会市场
  - trattativa
  - accordo
  - offerta
  - contratto
  - cessione
  - prestito
  - transfert # 法语
  - wechsel # 德语
  - vertrag
  - leihe
  - transferência # 葡语
  - contrato
  - empréstimo

# 热门球员/目标名单：命中名字直接视为"曼城相关"（转会窗期间自行维护，一行一个）
# 例： - "Florian Wirtz"
hot_players: []

# ==============================================================
# 焦点追踪对象：与他相关的所有消息（含别队动态）进入页面顶部专区卡，
# 并在时间线带 🎯 标记。可同时配多个。
#   aliases  中英文都写全（命中任一即算他的消息）
#   query    专属 Google News 检索词（默认取第一个别名）
#   注意：大众姓氏（如 Silva）务必用全名当别名，避免误伤
# ==============================================================
focus_targets:
  - key: bouaddi
    name: Ayyoub Bouaddi
    name_zh: 布阿迪
    desc_zh: 里尔中场 · 2007年生
    query: Bouaddi
    aliases:
      - Bouaddi
      - 布阿迪

