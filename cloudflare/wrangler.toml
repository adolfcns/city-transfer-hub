# Worker「city-trigger」的部署配置（wrangler deploy -c cloudflare/wrangler.toml）
# 注意：crons 必须在这里声明，否则命令行部署会把控制台里配的定时器抹掉
name = "city-trigger"
main = "../scripts/cloudflare-worker.js"
compatibility_date = "2026-01-01"

[triggers]
crons = ["*/30 * * * *"]

# 复用现有 D1 数据库保存全站木鱼累计次数
[[d1_databases]]
binding = "DB"
database_name = "city-reactions"
database_id = "9d9a9184-513d-4fc6-8f67-695d2637920e"
