name: fetch-and-deploy

on:
  schedule:
    - cron: '7,37 * * * *'   # 每 30 分钟（错峰档期）。转会截止日想调密：改成 '3,13,23,33,43,53 * * * *' 即每10分钟
  workflow_dispatch: {}       # 手动触发按钮
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# 防止重叠运行
concurrency:
  group: fetch-deploy
  cancel-in-progress: false

jobs:
  fetch-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci --no-audit --no-fund

      # 只有配置了 TWITTER_AUTH_TOKEN 才启动 RSSHub（推文通道）
      - name: Start RSSHub
        if: ${{ env.TWITTER_AUTH_TOKEN != '' }}
        run: |
          IMG=ghcr.io/diygod/rsshub:latest
          docker pull -q "$IMG" || IMG=docker.io/diygod/rsshub:latest
          docker run -d --name rsshub -p 1200:1200 \
            -e NODE_ENV=production \
            -e LOGGER_LEVEL=error \
            -e CACHE_TYPE= \
            -e TWITTER_AUTH_TOKEN="$TWITTER_AUTH_TOKEN" \
            "$IMG"
          ok=""
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:1200/healthz > /dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          if [ -n "$ok" ]; then
            echo "RSSHub ready"
            echo "RSSHUB_URL=http://127.0.0.1:1200" >> "$GITHUB_ENV"
          else
            echo "::warning::RSSHub 启动失败，本次跳过推文通道"
            docker logs rsshub | tail -20 || true
          fi

      - name: Fetch all sources
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"
          export PREV_DATA_URL="${BASE}/data/items.json"
          export PREV_STATUS_URL="${BASE}/data/status.json"
          node scripts/fetch.js

      - name: Assemble site
        run: |
          mkdir -p site/data
          cp -r static/. site/
          cp data/*.json site/data/
          sed -i "s/__BUILD_VERSION__/${GITHUB_SHA}/g" site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 镜像发布到 Cloudflare Pages（未配置 CLOUDFLARE_* Secrets 时自动跳过）
      - name: Mirror to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DB_ID="$(npx --yes wrangler@4 d1 list --json | node -e 'let s=""; process.stdin.on("data",d=>s+=d).on("end",()=>{ const rows=JSON.parse(s); const db=rows.find(x=>x.name==="city-reactions"); if(db) process.stdout.write(db.uuid||db.id||""); })')"
          if [ -z "$DB_ID" ]; then
            npx --yes wrangler@4 d1 create city-reactions --location apac
            DB_ID="$(npx --yes wrangler@4 d1 list --json | node -e 'let s=""; process.stdin.on("data",d=>s+=d).on("end",()=>{ const rows=JSON.parse(s); const db=rows.find(x=>x.name==="city-reactions"); if(db) process.stdout.write(db.uuid||db.id||""); })')"
          fi
          if [ -z "$DB_ID" ]; then
            echo "::error::D1 database city-reactions was not found after provisioning"
            exit 1
          fi
          echo "PRAYER_DB_ID=$DB_ID" >> "$GITHUB_ENV"

          cp cloudflare/pages-worker.js site/_worker.js
          cp cloudflare/pages-routes.json site/_routes.json
          PAGES_CONFIG_DIR="cloudflare/pages-deploy"
          mkdir -p "$PAGES_CONFIG_DIR"
          printf 'name = "city-transfer-hub"\ncompatibility_date = "2026-07-13"\npages_build_output_dir = "../../site"\n\n[[d1_databases]]\nbinding = "DB"\ndatabase_name = "city-reactions"\ndatabase_id = "%s"\n' "$DB_ID" > "$PAGES_CONFIG_DIR/wrangler.toml"
          (cd "$PAGES_CONFIG_DIR" && npx --yes wrangler@4 pages deploy --branch=main)

      # 仅在代码推送/手动运行时更新 Worker；定时抓取不重复部署
      - name: Deploy Cloudflare Worker
        if: ${{ github.event_name != 'schedule' && env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DEPLOY_CONFIG="cloudflare/wrangler.deploy.toml"
          cp cloudflare/wrangler.toml "$DEPLOY_CONFIG"
          DB_ID="${PRAYER_DB_ID:-}"
          if [ -z "$DB_ID" ]; then
            echo "::error::D1 database binding was not prepared by the Pages deployment"
            exit 1
          fi
          printf '\n[[d1_databases]]\nbinding = "DB"\ndatabase_name = "city-reactions"\ndatabase_id = "%s"\n' "$DB_ID" >> "$DEPLOY_CONFIG"
          echo "Deploying Worker with D1 binding DB -> $DB_ID"
          npx --yes wrangler@4 deploy --config "$DEPLOY_CONFIG"

      - name: Verify prayer counter API
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          node --input-type=module <<'NODE'
          const url = 'https://city-transfer-hub.pages.dev/prayer';
          const origin = 'https://adolfcns.github.io';
          for (let attempt = 1; attempt <= 10; attempt += 1) {
            try {
              const response = await fetch(url, {
                headers: { Origin: origin },
              });
              const body = await response.json();
              const cors = response.headers.get('access-control-allow-origin');
              if (response.ok && body.ok === true && Number.isInteger(body.count) && cors === origin) {
                console.log(`Direct prayer counter ready: ${body.count}`);
                process.exit(0);
              }
              console.log(`Attempt ${attempt}: HTTP ${response.status}, CORS ${cors}`, body);
            } catch (error) {
              console.log(`Attempt ${attempt}: ${error.message}`);
            }
            await new Promise((resolve) => setTimeout(resolve, 3000));
          }
          console.error('Prayer counter API did not become ready');
          process.exit(1);
          NODE
