name: fetch-and-deploy

on:
  schedule:
    - cron: '7,37 * * * *'   # 每 30 分钟（错峰档期）。转会截止日想调密：改成 '3,13,23,33,43,53 * * * *' 即每10分钟
  workflow_dispatch: {}       # 手动触发按钮
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# 防止重叠运行
concurrency:
  group: fetch-deploy
  cancel-in-progress: false

jobs:
  fetch-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci --no-audit --no-fund

      # 只有配置了 TWITTER_AUTH_TOKEN 才启动 RSSHub（推文通道）
      - name: Start RSSHub
        if: ${{ env.TWITTER_AUTH_TOKEN != '' }}
        run: |
          IMG=ghcr.io/diygod/rsshub:latest
          docker pull -q "$IMG" || IMG=docker.io/diygod/rsshub:latest
          docker run -d --name rsshub -p 1200:1200 \
            -e NODE_ENV=production \
            -e LOGGER_LEVEL=error \
            -e CACHE_TYPE= \
            -e TWITTER_AUTH_TOKEN="$TWITTER_AUTH_TOKEN" \
            "$IMG"
          ok=""
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:1200/healthz > /dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          if [ -n "$ok" ]; then
            echo "RSSHub ready"
            echo "RSSHUB_URL=http://127.0.0.1:1200" >> "$GITHUB_ENV"
          else
            echo "::warning::RSSHub 启动失败，本次跳过推文通道"
            docker logs rsshub | tail -20 || true
          fi

      - name: Fetch all sources
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"
          export PREV_DATA_URL="${BASE}/data/items.json"
          export PREV_STATUS_URL="${BASE}/data/status.json"
          node scripts/fetch.js

      - name: Assemble site
        run: |
          mkdir -p site/data
          cp -r static/. site/
          cp data/*.json site/data/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 镜像发布到 Cloudflare Pages（未配置 CLOUDFLARE_* Secrets 时自动跳过）
      - name: Mirror to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy site --project-name=city-transfer-hub --branch=main 2>&1 | tail -3

      # 仅在代码推送/手动运行时更新 Worker；定时抓取不重复部署
      - name: Deploy Cloudflare Worker
        if: ${{ github.event_name != 'schedule' && env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 deploy --config cloudflare/wrangler.toml
